<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアルタイム音声文字起こし</title>
    <script>
        async function start() {
            const res = await pywebview.api.start();
        }
        async function stop() {
            const res = await pywebview.api.stop();
        }
        async function pause() {
            const res = await pywebview.api.pause();
        }
        async function test() {
            const res = await pywebview.api.test();
        }
        async function loadSettings() {
            const res = await pywebview.api.load_settings();
            console.log("loadSettings", res);
            document.getElementById('model').value = res.whisper_model;
            document.getElementById('device').value = res.audio_device_name;
        }
        async function saveSettings() {
            const whisper_model = document.getElementById('model').value;
            const audio_device_name = document.getElementById('device').value;
            const res = await pywebview.api.save_settings(whisper_model, audio_device_name);
        }
    </script>
    <style>
        main {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            height: 400px;

            > div {
                height: 100%;
            }

            .text_container {
                flex: 1;
            }

            .vertical {
                display: flex;
                flex-direction: column;
                align-items: space-between;
                justify-content: space-between;
                width: 400px;
                height: 100%;
            }

            #text {
                width: 90%;
                height: 100%;
                background-color: #2b2b2b;
                color: white;
                padding: 8px;
            }

            .settings_header {
                display: flex;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }

            .settings {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                justify-content: center;
                gap: 4px;

                li {
                    list-style: none;
                }
            }

            button {
                width: 100px;
                height: 40px;
                border: none;
                cursor: pointer;
                font-size: 16px;
                font-weight: bold;
                border-radius: 4px;
            }

            .buttons {
                display: flex;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                gap: 8px;

                .start {
                    background-color: #4CAF50;
                    color: white;
                }

                .stop {
                    background-color: #f44336;
                    color: white;
                }

                .pause {
                    background-color: #FFC107;
                    color: white;
                }

                .test {
                    background-color: #2196F3;
                    color: white;
                }
            }
        }
    </style>
</head>
<body>
    <h1>リアルタイム音声文字起こし</h1>
    <main>
        <div class="text_container">
            <textarea name="text" id="text" readonly>
                コンソールの代わりにここに文字が表示されるようになる予定です
            </textarea>
        </div>
        <div class="vertical">
            <div>
                <div class="settings_header">
                    <h2>設定</h2>
                    <button class="load_settings_button" onclick="loadSettings()">読み込み</button>
                </div>
                <ul class="settings">
                    <li>
                        <label for="model">モデル</label>
                        <select name="model" id="model" onchange="saveSettings()">
                            <option value="mlx-community/whisper-turbo">mlx-community/whisper-turbo</option>
                            <option value="mlx-community/whisper-large-v3-turbo">mlx-community/whisper-large-v3-turbo</option>
                        </select>
                    </li>
                    <li>
                        <label for="device">Audio デバイス名</label>
                        <input type="text" name="device" id="device" onchange="saveSettings()" />
                    </li>
                </ul>
                
            </div>
            <div class="buttons">
                <button class="start" onclick="start()">開始</button>
                <button class="stop" onclick="stop()">停止</button>
                <button class="pause" onclick="pause()">一時停止</button>
                <button class="test" onclick="test()">テスト</button>
            </div>
        </div>
    </main>
</body>
</html>

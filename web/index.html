<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアルタイム音声文字起こし</title>
    <script>
        async function start() {
            let res = await pywebview.api.start();
        }
        async function stop() {
            let res = await pywebview.api.stop();
        }
        async function test() {
            let res = await pywebview.api.test();
        }
        async function summarize() {
            let res = await pywebview.api.summarize();
        }
    </script>
    <style>
        main {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            height: 400px;

            > div {
                height: 100%;
            }

            .vertical {
                display: flex;
                flex-direction: column;
                align-items: space-between;
                justify-content: space-between;
                height: 100%;
            }

            #text {
                width: 600px;
                height: 100%;
                background-color: #2b2b2b;
                color: white;
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <h1>リアルタイム音声文字起こし</h1>
    <main>
        <div>
            <textarea name="text" id="text" readonly>
                ここに文字が表示されます
            </textarea>
        </div>
        <div class="vertical">
            <div>
                <h2>設定</h2>
                <ul>
                    <li>
                        <label for="model">モデル</label>
                        <select name="model" id="model">
                            <option value="mlx-community/whisper-turbo">mlx-community/whisper-turbo</option>
                            <option value="mlx-community/whisper-large-v3-turbo">mlx-community/whisper-large-v3-turbo</option>
                        </select>
                    </li>
                </ul>
            </div>
            <div>
                <button onclick="start()">start</button>
                <button onclick="stop()">stop</button>
                <button onclick="test()">test</button>
                <button onclick="summarize()">summarize</button>
            </div>
        </div>
    </main>
</body>
</html>
